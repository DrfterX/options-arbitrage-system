<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin · 管理面板 — 信号矩阵 Premium</title>
<link rel="stylesheet" href="/static/style.css">
<style>
/* ═══════════════════════════════════════════════════════════════
   Admin Panel — Terminal Luxe
   ═══════════════════════════════════════════════════════════════ */

.admin-wrap {
  max-width: 640px;
  margin: 40px auto;
}

.admin-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 28px 24px;
  position: relative;
  overflow: hidden;
}

.admin-card::before {
  content: '';
  position: absolute;
  top: -80px;
  right: -60px;
  width: 240px;
  height: 240px;
  background: radial-gradient(circle, rgba(240, 180, 41, .05) 0%, transparent 70%);
  pointer-events: none;
}

.admin-card-title {
  font-size: .9rem;
  font-weight: 700;
  letter-spacing: .04em;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

.admin-card-title .icon {
  color: var(--brand);
  font-size: 1rem;
}

.admin-field {
  margin-bottom: 16px;
}

.admin-field label {
  display: block;
  font-size: .62rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 5px;
}

.admin-input {
  width: 100%;
  padding: 9px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  background: rgba(8, 11, 16, .5);
  color: var(--text);
  font-size: .75rem;
  font-family: var(--font-mono);
  outline: none;
  transition: border-color .2s var(--ease-out);
}

.admin-input:focus {
  border-color: var(--brand);
  box-shadow: 0 0 0 2px rgba(240, 180, 41, .08);
}

.admin-input::placeholder {
  color: var(--text4);
}

.admin-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 22px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
  background: rgba(240, 180, 41, .08);
  color: var(--brand);
  font-size: .7rem;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s var(--ease-out);
  font-family: var(--font-ui);
  letter-spacing: .03em;
}

.admin-btn:hover {
  background: var(--brand);
  color: #000;
  border-color: var(--brand);
  box-shadow: 0 2px 16px rgba(240, 180, 41, .15);
}

.admin-btn:active {
  transform: scale(.97);
}

.admin-btn.loading {
  opacity: .6;
  pointer-events: none;
}

.admin-btn.danger {
  background: rgba(240, 68, 56, .08);
  color: var(--long);
  border-color: rgba(240, 68, 56, .2);
}

.admin-btn.danger:hover {
  background: var(--long);
  color: #fff;
  border-color: var(--long);
  box-shadow: 0 2px 16px rgba(240, 68, 56, .15);
}

/* ── login form ── */
.login-form {
  text-align: center;
  padding: 20px 0;
}

.login-form .lock-icon {
  font-size: 2rem;
  margin-bottom: 12px;
  opacity: .4;
}

.login-form .login-desc {
  font-size: .65rem;
  color: var(--text3);
  margin-bottom: 20px;
}

.login-form .admin-input {
  max-width: 320px;
  margin: 0 auto 16px;
  text-align: center;
  font-size: .9rem;
  letter-spacing: .2em;
}

/* ── token result display ── */
.token-result {
  margin-top: 14px;
  padding: 12px 14px;
  border-radius: var(--radius-sm);
  background: rgba(34, 197, 94, .06);
  border: 1px solid rgba(34, 197, 94, .15);
  font-family: var(--font-mono);
  font-size: .65rem;
  word-break: break-all;
  color: var(--short);
  display: none;
}

.token-result.show {
  display: block;
}

.token-result .tr-label {
  font-size: .55rem;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: .06em;
  margin-bottom: 4px;
}

.token-result .tr-value {
  font-size: .75rem;
  font-weight: 600;
  color: var(--short);
}

.token-result .tr-email {
  font-size: .6rem;
  color: var(--text2);
  margin-top: 4px;
}

/* ── error message ── */
.admin-error {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: rgba(240, 68, 56, .08);
  border: 1px solid rgba(240, 68, 56, .15);
  color: var(--long);
  font-size: .62rem;
  display: none;
}

.admin-error.show {
  display: block;
}

/* ── success toast ── */
.admin-success {
  margin-top: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: rgba(34, 197, 94, .08);
  border: 1px solid rgba(34, 197, 94, .15);
  color: var(--short);
  font-size: .62rem;
  display: none;
}

.admin-success.show {
  display: block;
}

/* ── subscriptions table ── */
.sub-table-wrap {
  margin-top: 20px;
  overflow-x: auto;
}

.sub-table {
  width: 100%;
  border-collapse: collapse;
  font-size: .62rem;
}

.sub-table th {
  text-align: left;
  padding: 6px 8px;
  color: var(--text3);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  border-bottom: 1px solid var(--border);
  font-size: .55rem;
}

.sub-table td {
  padding: 6px 8px;
  color: var(--text2);
  border-bottom: 1px solid rgba(30, 35, 50, .5);
  font-family: var(--font-mono);
  font-size: .58rem;
}

.sub-table tr:hover td {
  background: rgba(255,255,255,.02);
}

.sub-table .status-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 2px;
  font-size: .55rem;
  font-weight: 600;
}

.sub-table .status-badge.active {
  color: var(--short);
  background: rgba(34, 197, 94, .10);
}

.sub-table .status-badge.expired {
  color: var(--long);
  background: rgba(240, 68, 56, .10);
}

.sub-table .status-badge.cancelled {
  color: var(--text3);
  background: rgba(90, 97, 115, .10);
}

.sub-table .td-email {
  max-width: 140px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

/* ── panel section ── */
.panel-section {
  margin-bottom: 24px;
}

.panel-section-title {
  font-size: .68rem;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: .04em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.panel-section-title .sec-icon {
  color: var(--brand);
  font-size: .75rem;
}

/* ── logout bar ── */
.admin-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.admin-bar .ab-left {
  font-size: .65rem;
  color: var(--text3);
}

.admin-bar .ab-left span {
  color: var(--short);
  font-weight: 600;
}

.admin-bar .ab-right {
  font-size: .6rem;
  cursor: pointer;
  color: var(--text3);
  transition: color .15s;
}

.admin-bar .ab-right:hover {
  color: var(--long);
}

/* ── empty state ── */
.empty-state {
  text-align: center;
  padding: 24px;
  color: var(--text3);
  font-size: .62rem;
}

.empty-state .empty-icon {
  font-size: 1.2rem;
  opacity: .3;
  margin-bottom: 6px;
}

/* ── responsive ── */
@media (max-width: 640px) {
  .admin-wrap { margin: 20px 10px; }
  .admin-card { padding: 18px 14px; }
  .sub-table { font-size: .55rem; }
}

/* ── nav link ── */
.admin-nav-back {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  margin-bottom: 16px;
  font-size: .62rem;
  color: var(--text3);
  text-decoration: none;
  transition: color .15s;
}

.admin-nav-back:hover {
  color: var(--brand);
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1><span class="dot"></span><span class="accent">✦</span> Admin · 管理面板</h1>
    <div class="topbar-right">
      <a href="/" class="nav-tab"><span class="nav-tab-icon">◈</span> 返回看板</a>
      <span class="topbar-time">{{ now }}</span>
    </div>
  </div>

  <div class="main">
    <div class="admin-wrap">

      <!-- ─── Login Form (hidden after auth) ─── -->
      <div class="admin-card" id="loginCard">
        <div class="login-form">
          <div class="lock-icon">🔐</div>
          <div class="admin-card-title" style="justify-content:center;border:none;margin-bottom:8px;">
            <span class="icon">✦</span> 管理员验证
          </div>
          <div class="login-desc">输入管理密码以访问 Token 生成面板</div>
          <input type="password" class="admin-input" id="loginPassword" placeholder="管理员密码" autocomplete="off">
          <div>
            <button class="admin-btn" id="loginBtn" onclick="adminLogin()">
              <span>→</span> 验证
            </button>
          </div>
          <div class="admin-error" id="loginError">密码错误，请重试</div>
        </div>
      </div>

      <!-- ─── Admin Panel (hidden until auth) ─── -->
      <div id="adminPanel" style="display:none;">

        <!-- Logout bar -->
        <div class="admin-bar">
          <div class="ab-left">已验证 · <span id="adminStatus">管理员</span></div>
          <div class="ab-right" onclick="adminLogout()">✕ 退出登录</div>
        </div>

        <!-- ── Token Generation ── -->
        <div class="admin-card panel-section">
          <div class="panel-section-title">
            <span class="sec-icon">✦</span> 生成 Pro Token
          </div>
          <div class="admin-field">
            <label for="tokenEmail">用户邮箱</label>
            <input type="email" class="admin-input" id="tokenEmail" placeholder="user@example.com">
          </div>
          <button class="admin-btn" id="generateBtn" onclick="generateToken()">
            <span>⚡</span> 生成 Token
          </button>
          <div class="token-result" id="tokenResult">
            <div class="tr-label">Token</div>
            <div class="tr-value" id="tokenValue"></div>
            <div class="tr-email" id="tokenEmailDisplay"></div>
          </div>
          <div class="admin-error" id="generateError">生成失败，请重试</div>
          <div class="admin-success" id="generateSuccess">Token 已成功生成!</div>
        </div>

        <!-- ── Active Subscriptions ── -->
        <div class="admin-card panel-section">
          <div class="panel-section-title">
            <span class="sec-icon">📋</span> 订阅记录
          </div>
          <div class="sub-table-wrap" id="subTableWrap">
            <div class="empty-state" id="subLoading">
              <div class="empty-icon">⏳</div>
              <div>加载中…</div>
            </div>
          </div>
          <button class="admin-btn" id="refreshSubsBtn" onclick="loadSubscriptions()" style="margin-top:12px;font-size:.6rem;padding:6px 14px;">
            <span>↻</span> 刷新列表
          </button>
        </div>

      </div>

    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
//  Admin Panel  —  password-protected token generator
// ═══════════════════════════════════════════════════════════════════

var PASSWORD = sessionStorage.getItem('admin_password');

// ── Init auth state ──
function initAuth() {
  if (PASSWORD) {
    document.getElementById('loginCard').style.display = 'none';
    document.getElementById('adminPanel').style.display = '';
    loadSubscriptions();
  }
}

// ── Login ──
function adminLogin() {
  var btn = document.getElementById('loginBtn');
  var pwd = document.getElementById('loginPassword').value;
  if (!pwd) return;

  btn.classList.add('loading');
  btn.textContent = '⏳ 验证中…';

  fetch('/api/admin/verify-password', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: pwd})
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    btn.classList.remove('loading');
    btn.innerHTML = '<span>→</span> 验证';

    if (d.ok) {
      sessionStorage.setItem('admin_password', pwd);
      PASSWORD = pwd;
      document.getElementById('loginCard').style.display = 'none';
      document.getElementById('adminPanel').style.display = '';
      loadSubscriptions();
    } else {
      document.getElementById('loginError').classList.add('show');
      document.getElementById('loginPassword').value = '';
      document.getElementById('loginPassword').focus();
    }
  })
  .catch(function(e) {
    btn.classList.remove('loading');
    btn.innerHTML = '<span>→</span> 验证';
    document.getElementById('loginError').classList.add('show');
  });
}

// ── Login on Enter key ──
document.addEventListener('DOMContentLoaded', function() {
  initAuth();
  document.getElementById('loginPassword').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') adminLogin();
  });
  document.getElementById('tokenEmail').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generateToken();
  });
});

// ── Logout ──
function adminLogout() {
  sessionStorage.removeItem('admin_password');
  PASSWORD = null;
  document.getElementById('loginCard').style.display = '';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginPassword').value = '';
  document.getElementById('loginError').classList.remove('show');
}

// ── Generate Token ──
function generateToken() {
  var btn = document.getElementById('generateBtn');
  var email = document.getElementById('tokenEmail').value.trim();
  if (!email) {
    document.getElementById('generateError').textContent = '请输入用户邮箱';
    document.getElementById('generateError').classList.add('show');
    return;
  }

  btn.classList.add('loading');
  btn.textContent = '⏳ 生成中…';
  document.getElementById('generateError').classList.remove('show');
  document.getElementById('generateSuccess').classList.remove('show');
  document.getElementById('tokenResult').classList.remove('show');

  fetch('/api/admin/generate-token', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({password: PASSWORD, email: email})
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    btn.classList.remove('loading');
    btn.innerHTML = '<span>⚡</span> 生成 Token';

    if (d.token) {
      document.getElementById('tokenValue').textContent = d.token;
      document.getElementById('tokenEmailDisplay').textContent = 'Email: ' + d.email;
      document.getElementById('tokenResult').classList.add('show');
      document.getElementById('generateSuccess').classList.add('show');
      document.getElementById('tokenEmail').value = '';
      // Refresh subscription list
      loadSubscriptions();
      // Copy to clipboard
      navigator.clipboard.writeText(d.token).catch(function() {});
    } else {
      document.getElementById('generateError').textContent = d.error || '生成失败';
      document.getElementById('generateError').classList.add('show');
    }
  })
  .catch(function(e) {
    btn.classList.remove('loading');
    btn.innerHTML = '<span>⚡</span> 生成 Token';
    document.getElementById('generateError').textContent = '网络错误';
    document.getElementById('generateError').classList.add('show');
  });
}

// ── Load Subscriptions ──
function loadSubscriptions() {
  var wrap = document.getElementById('subTableWrap');
  wrap.innerHTML = '<div class="empty-state" id="subLoading"><div class="empty-icon">⏳</div><div>加载中…</div></div>';

  fetch('/api/admin/list-subscriptions?password=' + encodeURIComponent(PASSWORD || ''))
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (!data || !data.length) {
        wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>暂无订阅记录</div></div>';
        return;
      }

      var html = '<table class="sub-table">'
        + '<thead><tr>'
        + '<th>ID</th><th>Email</th><th>状态</th><th>会话 ID</th><th>创建时间</th><th>过期时间</th>'
        + '</tr></thead><tbody>';

      data.forEach(function(row) {
        var statusClass = row.status === 'active' ? 'active' : (row.status === 'expired' ? 'expired' : 'cancelled');
        var sessionDisplay = row.session_id && row.session_id.length > 24
          ? row.session_id.slice(0, 24) + '…'
          : (row.session_id || '—');
        html += '<tr>'
          + '<td>' + row.id + '</td>'
          + '<td class="td-email" title="' + (row.email || '') + '">' + (row.email || '—') + '</td>'
          + '<td><span class="status-badge ' + statusClass + '">' + row.status + '</span></td>'
          + '<td style="font-size:.52rem;">' + sessionDisplay + '</td>'
          + '<td>' + (row.created_at || '—') + '</td>'
          + '<td>' + (row.expires_at || '—') + '</td>'
          + '</tr>';
      });

      html += '</tbody></table>';
      wrap.innerHTML = html;
    })
    .catch(function(e) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-icon">❌</div><div>加载失败: ' + (e.message || '未知错误') + '</div></div>';
    });
}
</script>
</body>
</html>
